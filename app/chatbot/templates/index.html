<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Math Chatbot</title>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
        <style>
            :root {
                --bg-from: #f0f4ff;
                --bg-mid:  #faf0ff;
                --bg-to:   #fff0f7;
                --glass:   rgba(255,255,255,0.72);
                --glass-border: rgba(255,255,255,0.9);
                --shadow:  0 8px 40px rgba(130,90,220,0.10);
                --accent1: #7c5cfc;
                --accent2: #f857a6;
                --accent-grad: linear-gradient(135deg, #7c5cfc, #f857a6);
                --text-primary: #1a1040;
                --text-secondary: #6b5b8a;
                --text-muted: #a99ec0;
                --user-bg: linear-gradient(135deg, #7c5cfc22, #f857a622);
                --user-border: rgba(124,92,252,0.25);
                --bot-bg: rgba(255,255,255,0.85);
                --bot-border: rgba(255,255,255,0.95);
                --input-bg: rgba(255,255,255,0.8);
                --radius-lg: 24px;
                --radius-msg: 20px;
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: var(--bg-from);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 24px;
                position: relative;
                overflow: hidden;
            }

            /* Gradient mesh background */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(ellipse 80% 60% at 15% 10%,  #ddd6fe88 0%, transparent 55%),
                    radial-gradient(ellipse 60% 50% at 85% 20%,  #fbcfe888 0%, transparent 50%),
                    radial-gradient(ellipse 70% 60% at 50% 90%,  #bfdbfe66 0%, transparent 55%),
                    radial-gradient(ellipse 50% 40% at 80% 80%,  #f9a8d477 0%, transparent 50%),
                    linear-gradient(160deg, #f0f4ff 0%, #faf0ff 50%, #fff0f7 100%);
                z-index: 0;
                animation: meshShift 12s ease-in-out infinite alternate;
            }

            @keyframes meshShift {
                0%   { opacity: 1; }
                100% { opacity: 0.85; filter: hue-rotate(15deg); }
            }

            /* Floating blobs */
            body::after {
                content: '';
                position: fixed;
                width: 420px; height: 420px;
                border-radius: 50%;
                background: radial-gradient(circle, #c4b5fd44, transparent 70%);
                top: -100px; right: -80px;
                z-index: 0;
                animation: blobFloat 8s ease-in-out infinite alternate;
            }

            @keyframes blobFloat {
                0%   { transform: translate(0,0) scale(1); }
                100% { transform: translate(-30px,40px) scale(1.1); }
            }

            /* ── Chat container ── */
            .chat-wrap {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 820px;
                border-radius: var(--radius-lg);
                background: var(--glass);
                backdrop-filter: blur(28px) saturate(1.6);
                -webkit-backdrop-filter: blur(28px) saturate(1.6);
                border: 1.5px solid var(--glass-border);
                box-shadow:
                    var(--shadow),
                    0 1px 0 rgba(255,255,255,0.9) inset,
                    0 -1px 0 rgba(200,180,255,0.15) inset;
                overflow: hidden;
                animation: slideUp 0.6s cubic-bezier(.22,1,.36,1) both;
            }

            @keyframes slideUp {
                from { opacity:0; transform: translateY(30px) scale(0.97); }
                to   { opacity:1; transform: translateY(0) scale(1); }
            }

            /* ── Header ── */
            .chat-header {
                padding: 22px 28px;
                display: flex;
                align-items: center;
                gap: 14px;
                border-bottom: 1px solid rgba(200,180,255,0.25);
                background: rgba(255,255,255,0.5);
                backdrop-filter: blur(10px);
            }

            .header-icon {
                width: 46px; height: 46px;
                border-radius: 14px;
                background: var(--accent-grad);
                display: flex; align-items: center; justify-content: center;
                font-size: 22px;
                box-shadow: 0 4px 16px rgba(124,92,252,0.35);
                flex-shrink: 0;
            }

            .header-text h1 {
                font-size: 20px;
                font-weight: 700;
                color: var(--text-primary);
                letter-spacing: -0.3px;
            }

            .header-text p {
                font-size: 13px;
                color: var(--text-muted);
                font-weight: 400;
                margin-top: 2px;
            }

            .status-dot {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 13px;
                color: var(--text-muted);
                font-weight: 500;
            }

            .status-dot::before {
                content: '';
                width: 8px; height: 8px;
                border-radius: 50%;
                background: #34d399;
                box-shadow: 0 0 0 3px #34d39933;
                animation: pulse-dot 2s ease-in-out infinite;
            }

            @keyframes pulse-dot {
                0%,100% { box-shadow: 0 0 0 3px #34d39933; }
                50%      { box-shadow: 0 0 0 6px #34d39911; }
            }

            /* ── Messages ── */
            #messages {
                height: 470px;
                overflow-y: auto;
                padding: 24px 24px 8px;
                display: flex;
                flex-direction: column;
                gap: 14px;
                scroll-behavior: smooth;
            }

            #messages::-webkit-scrollbar { width: 5px; }
            #messages::-webkit-scrollbar-track { background: transparent; }
            #messages::-webkit-scrollbar-thumb {
                background: rgba(124,92,252,0.2);
                border-radius: 99px;
            }

            /* Empty state */
            .empty-state {
                margin: auto;
                text-align: center;
                color: var(--text-muted);
                animation: fadeIn 0.5s ease both;
            }

            .empty-state .big-icon { font-size: 52px; margin-bottom: 14px; }
            .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
            .empty-state p  { font-size: 14px; line-height: 1.6; max-width: 280px; margin: 0 auto; }

            .suggestions {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
                margin-top: 18px;
            }

            .suggestion-chip {
                padding: 8px 14px;
                border-radius: 99px;
                background: rgba(124,92,252,0.08);
                border: 1px solid rgba(124,92,252,0.18);
                color: var(--accent1);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s;
            }

            .suggestion-chip:hover {
                background: rgba(124,92,252,0.15);
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(124,92,252,0.15);
            }

            /* Messages */
            .user-msg, .bot-msg, .loading-msg {
                padding: 13px 18px;
                border-radius: var(--radius-msg);
                font-size: 15px;
                line-height: 1.65;
                max-width: 78%;
                animation: fadeIn 0.3s ease both;
                word-break: break-word;
            }

            @keyframes fadeIn {
                from { opacity:0; transform: translateY(10px); }
                to   { opacity:1; transform: translateY(0); }
            }

            .user-msg {
                background: var(--user-bg);
                border: 1px solid var(--user-border);
                color: var(--text-primary);
                align-self: flex-end;
                border-bottom-right-radius: 6px;
                font-weight: 500;
            }

            .bot-msg {
                background: var(--bot-bg);
                border: 1px solid var(--bot-border);
                color: var(--text-primary);
                align-self: flex-start;
                border-bottom-left-radius: 6px;
                box-shadow: 0 2px 16px rgba(130,90,220,0.07);
                white-space: pre-wrap;
                font-family: 'DM Mono', monospace;
                font-size: 14px;
            }

            .bot-msg .bot-label {
                font-family: 'DM Sans', sans-serif;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--accent1);
                margin-bottom: 6px;
                display: block;
            }

            .loading-msg {
                background: var(--bot-bg);
                border: 1px solid var(--bot-border);
                color: var(--text-muted);
                align-self: flex-start;
                border-bottom-left-radius: 6px;
                font-size: 14px;
                font-style: italic;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .dots span {
                display: inline-block;
                width: 5px; height: 5px;
                border-radius: 50%;
                background: var(--accent1);
                animation: dotBounce 1.2s ease-in-out infinite;
            }
            .dots span:nth-child(2) { animation-delay: 0.2s; }
            .dots span:nth-child(3) { animation-delay: 0.4s; }

            @keyframes dotBounce {
                0%,80%,100% { transform: translateY(0); opacity:0.4; }
                40%          { transform: translateY(-5px); opacity:1; }
            }

            /* ── Input area ── */
            #input-area {
                display: flex;
                gap: 10px;
                padding: 16px 20px;
                background: rgba(255,255,255,0.6);
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(200,180,255,0.2);
            }

            .input-wrapper {
                flex: 1;
                position: relative;
                display: flex;
                align-items: center;
            }

            input {
                width: 100%;
                padding: 13px 20px;
                background: var(--input-bg);
                border: 1.5px solid rgba(200,180,255,0.4);
                border-radius: 99px;
                font-size: 15px;
                font-family: 'DM Sans', sans-serif;
                color: var(--text-primary);
                outline: none;
                transition: border 0.25s, box-shadow 0.25s;
                box-shadow: 0 2px 12px rgba(124,92,252,0.06);
            }

            input:focus {
                border-color: var(--accent1);
                box-shadow: 0 0 0 4px rgba(124,92,252,0.12), 0 2px 12px rgba(124,92,252,0.1);
            }

            input::placeholder { color: var(--text-muted); }

            button {
                padding: 13px 26px;
                background: var(--accent-grad);
                color: white;
                border: none;
                border-radius: 99px;
                cursor: pointer;
                font-size: 15px;
                font-weight: 600;
                font-family: 'DM Sans', sans-serif;
                letter-spacing: 0.2px;
                transition: all 0.25s;
                box-shadow: 0 4px 18px rgba(124,92,252,0.35);
                white-space: nowrap;
            }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(124,92,252,0.45);
            }

            button:active { transform: translateY(0); }

            button:disabled {
                background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }
        </style>
    </head>
    <body>
        <div class="chat-wrap">
            <div class="chat-header">
                <div class="header-icon">🧮</div>
                <div class="header-text">
                    <h1>Math Chatbot</h1>
                    <p>Powered by TinyLlama · Fine-tuned</p>
                </div>
                <div class="status-dot">Online</div>
            </div>

            <div id="messages">
                <div class="empty-state" id="emptyState">
                    <div class="big-icon">✨</div>
                    <h2>Ask me anything math!</h2>
                    <p>From algebra to calculus, I'm here to help you solve problems step by step.</p>
                    <div class="suggestions">
                        <span class="suggestion-chip" onclick="useChip(this)">Solve x² + 5x + 6 = 0</span>
                        <span class="suggestion-chip" onclick="useChip(this)">What is the derivative of sin(x)?</span>
                        <span class="suggestion-chip" onclick="useChip(this)">Simplify 3/4 + 2/3</span>
                    </div>
                </div>
            </div>

            <div id="input-area">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="userInput"
                        placeholder="Ask a math question..."
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    />
                </div>
                <button id="sendBtn" onclick="sendMessage()">Send ↑</button>
            </div>
        </div>

        <script>
            function useChip(el) {
                document.getElementById('userInput').value = el.textContent;
                sendMessage();
            }

            async function sendMessage() {
                const input    = document.getElementById('userInput');
                const messages = document.getElementById('messages');
                const btn      = document.getElementById('sendBtn');
                const message  = input.value.trim();
                if (!message) return;

                // Remove empty state
                const empty = document.getElementById('emptyState');
                if (empty) empty.remove();

                messages.innerHTML +=
                    `<div class="user-msg">${message}</div>`;
                input.value  = '';
                btn.disabled = true;
                btn.textContent = '...';

                const loadingId = 'loading-' + Date.now();
                messages.innerHTML += `
                    <div class="loading-msg" id="${loadingId}">
                        <div class="dots">
                            <span></span><span></span><span></span>
                        </div>
                        Thinking…
                    </div>`;
                messages.scrollTop = messages.scrollHeight;

                try {
                    const res  = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                    const data = await res.json();

                    document.getElementById(loadingId).remove();
                    messages.innerHTML +=
                        `<div class="bot-msg"><span class="bot-label">Answer</span>${data.response}</div>`;
                } catch (e) {
                    document.getElementById(loadingId).remove();
                    messages.innerHTML +=
                        `<div class="bot-msg">❌ Error — please try again.</div>`;
                }

                btn.disabled    = false;
                btn.textContent = 'Send ↑';
                messages.scrollTop = messages.scrollHeight;
            }
        </script>
    </body>
    </html>
